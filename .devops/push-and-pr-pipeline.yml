trigger: none

pool:
  vmImage: "ubuntu-latest"

variables:
  # Replace with your actual GitHub Organization/Repository
  GITHUB_REPO_BRANCH: "main"
  GITHUB_REPO_PATH: "gcapnias/umbraco-cloud-develop"

steps:
  - checkout: self
    persistCredentials: true
    clean: true
    fetchDepth: 0 # Get all history so we can merge branches

  - bash: |
      set -e

      # 0. Setup Identity
      git config --global user.email "devops@dot-see.com"
      git config --global user.name "Dot-See DevOps"

      # 1. Validate the Token using the correct flag
      echo "Validating GITHUB_TOKEN..."
      if ! gh api user --silent; then
          echo "Error: GITHUB_TOKEN is invalid or expired."
          echo "Check your token scopes (needs 'repo') and ensure it is exported."
          exit 1
      fi

      USER_NAME=$(gh api user --jq '.login')
      echo "Authenticated as: '$USER_NAME'"

      # 2. Define/Verify the 'upstream' remote
      if ! git remote | grep -q "upstream"; then
          echo "Remote 'upstream' not found. Adding it now..."
          git remote add upstream "https://github.com/$(GITHUB_REPO_PATH).git"

          # 2. Tell Git to use GitHub CLI as its credential helper
          # The --hostname flag ensures it only affects GitHub.com traffic
          gh auth setup-git --hostname github.com
      else
          echo "Remote 'upstream' already exists."
      fi

      # 3. Fetch latest from GitHub to ensure we have the history
      git fetch origin main
      git fetch upstream $(GITHUB_REPO_BRANCH)

      # 4. Create a unique Sync branch based on the current Azure DevOps main
      git checkout main
      SYNC_BRANCH="sync-upstream-$(Build.BuildId)"
      git checkout -b $SYNC_BRANCH

      # 5. Merge GitHub [$(GITHUB_REPO_BRANCH)] into our sync branch to handle any upstream changes
      echo "Merging GitHub [$(GITHUB_REPO_BRANCH)] into [$SYNC_BRANCH]..."

      # We use '-X ours' to automatically resolve conflicts by favoring our version.
      # If you prefer their GitHub version to win, use '-X theirs' instead.
      if git merge upstream/$(GITHUB_REPO_BRANCH) --no-edit -X ours; then
          echo "Merge successful."
      else
          echo "##vso[task.logissue type=error]Conflict detected! Manual resolution required."
          exit 1
      fi

      # 6. Push the sync branch to GitHub
      git push upstream $SYNC_BRANCH

      # 7. Create the PR using GitHub CLI
      # 'gh' uses GITHUB_TOKEN environment variable by default
      echo "Creating Pull Request on GitHub [$(GITHUB_REPO_BRANCH)]..."
      gh pr create \
        --repo $(GITHUB_REPO_PATH) \
        --base $(GITHUB_REPO_BRANCH) \
        --head $SYNC_BRANCH \
        --title "Synchronization from Dot-See DevOps to GitHub [$(GITHUB_REPO_BRANCH)] ($(Build.BuildId))" \
        --body "Automated PR from Dot-See DevOps. Please review and merge."

    displayName: "Sync to GitHub and Create PR"
    env:
      # Ensure GITHUB_TOKEN is defined in your Pipeline Library/Variables
      GITHUB_TOKEN: $(GITHUB_TOKEN)
