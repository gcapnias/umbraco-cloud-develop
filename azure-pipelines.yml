# Disable automatic triggers
trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Validate
  displayName: 'Build Validation'
  jobs:
  - job: RunTests
    steps:
    - script: |
        echo "Running build validation..."
        # Add your build commands here (e.g., dotnet build)
        dotnet build
      displayName: 'Build Solution'

- stage: DeployToProduction
  displayName: 'Merge to Main'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - deployment: MergeJob
    environment: 'Production' # This is the key for manual approval
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            persistCredentials: true
            clean: true
            fetchDepth: 0 # Get all history so we can merge branches
          - script: |
              set -euo pipefail

              # 1. Configure Identity
              git config user.email "merge-pipeline@dot-see.com"
              git config user.name "Acme's [Merge to Main] pipeline"

              # 2. Ensure we have the latest from remote
              git fetch origin main
              git fetch origin develop

              # 3. Force local main to match origin/main
              git checkout -B main origin/main

              # 4. Perform the merge
              # Using 'origin/develop' ensures we get the latest pushed code
              git merge origin/develop --no-ff -m "Pipeline automated merge: develop → main"
              
              # 5. Push the changes
              git push origin main
            displayName: 'Merge `Develop` into `Main` branch'